server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # "backend" resolves via Docker Compose service-name DNS — real once this image
  # runs alongside a "backend" service on the same compose network (see
  # docker-compose.prod.yml). This is the plain-HTTP config baked into the image for
  # standalone use; docker-compose.prod.yml mounts nginx.prod.conf (TLS-terminating)
  # over this instead — see docs/operations/cloud-deployment.md.
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri /index.html;
  }
}
