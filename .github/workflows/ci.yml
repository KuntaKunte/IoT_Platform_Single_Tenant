name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: iot_platform
          POSTGRES_USER: iot_user
          POSTGRES_PASSWORD: change-me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U iot_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
      emqx:
        image: emqx/emqx:5.7
        ports:
          - 1883:1883
          - 18083:18083
      mailpit:
        image: axllent/mailpit
        ports:
          - 1025:1025
          - 8025:8025
      # GitHub Actions service containers can't specify a custom `command:` (unlike
      # docker-compose), and the official minio/minio image requires one (`server /data`)
      # to start. `edge-cicd` is a tag MinIO itself publishes specifically for this —
      # its default CMD is already `minio server /data`, no override needed. (A prior
      # version of this workflow used bitnami/minio for the same reason; Bitnami
      # migrated all free images to bitnamilegacy/* on 2025-08-28, breaking that pull
      # entirely — confirmed via the real first CI run after this repo was pushed to
      # GitHub. edge-cicd is maintained by MinIO directly, not a third party, so it
      # isn't subject to the same risk.)
      minio:
        image: minio/minio:edge-cicd
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: iot_platform
      POSTGRES_USER: iot_user
      POSTGRES_PASSWORD: change-me
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      MQTT_HOST: localhost
      MQTT_PORT: 1883
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      MINIO_ENDPOINT: localhost
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: iot-platform
      JWT_SECRET: ci-test-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run migrate
      - run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
