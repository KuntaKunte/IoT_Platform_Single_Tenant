# An explicit project name is required here — without one, Compose derives the
# project name from the directory alone, which is IDENTICAL to docker-compose.dev.yml's
# default project name (same directory, no name of its own either). Bringing this file
# up would then replace docker-compose.dev.yml's running containers in place (same
# container names within the same default project), destroying whatever they held
# (docker-compose.dev.yml's postgres has no named volume — its data isn't just
# "replaced", it's gone). Discovered by hitting it for real during this phase's
# verification. docker-compose.dev.yml is intentionally left without one of its own —
# adding a `name:` retroactively would rename its already-running containers/volumes.
name: iot-platform-prod

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data

  emqx:
    image: emqx/emqx:5.7
    restart: unless-stopped
    # 1883 is published deliberately — real devices need to reach MQTT directly;
    # Cloudflare's HTTP(S) proxy doesn't carry raw MQTT TCP. See
    # docs/operations/cloud-deployment.md for the recommended TLS (8883) hardening
    # step, which isn't wired up by default here.
    ports:
      - '1883:1883'
    volumes:
      - emqx_data:/opt/emqx/data

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/owner/repo-backend:latest}
    build: .
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/owner/repo-frontend:latest}
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./frontend/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  emqx_data:
